name: 'AI Code Reviewer'
description: 'Autonomous PR code review using OpenAI. Configurable via .reviewer.yaml.'
branding:
  icon: 'eye'
  color: 'blue'
inputs:
  openai-api-key:
    description: 'OpenAI API key'
    required: true
  reviewer-mode:
    description: '"default" (gpt-4o-mini, cheapest) or "production" (gpt-4o for analysis agents)'
    required: false
    default: 'default'
  github-token:
    description: 'GitHub token'
    required: true
  pr-number:
    description: 'PR number'
    required: true
  repo:
    description: 'Repository name (owner/repo)'
    required: true
  base-sha:
    description: 'Base branch SHA'
    required: true
  head-sha:
    description: 'Head branch SHA'
    required: true
runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    OPENAI_API_KEY: ${{ inputs.openai-api-key }}
    REVIEWER_MODE: ${{ inputs.reviewer-mode }}
    GITHUB_TOKEN: ${{ inputs.github-token }}
    PR_NUMBER: ${{ inputs.pr-number }}
    REPO: ${{ inputs.repo }}
    BASE_SHA: ${{ inputs.base-sha }}
    HEAD_SHA: ${{ inputs.head-sha }}
